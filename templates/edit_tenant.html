{% extends "base.html" %}

{% block title %}Edit Tenant - RentKeepers{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-pencil-square me-2"></i>Edit Tenant: {{ tenant.name }}
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Tenant Name *</label>
                        <input type="text" class="form-control" id="name" name="name" 
                               value="{{ tenant.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="property_address" class="form-label">Property Address *</label>
                        <input type="text" class="form-control" id="property_address" name="property_address" 
                               value="{{ tenant.property_address }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="monthly_rent" class="form-label">Monthly Rent ($) *</label>
                        <input type="number" class="form-control" id="monthly_rent" name="monthly_rent" 
                               step="0.01" min="0" value="{{ tenant.monthly_rent }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="due_day" class="form-label">Rent Due Day (1-31) *</label>
                        <input type="number" class="form-control" id="due_day" name="due_day" 
                               min="1" max="31" value="{{ tenant.due_day }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" id="phone" name="phone" 
                               value="{{ tenant.phone or '' }}">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Tenant Email</label>
                        <input type="email" class="form-control" id="email" name="email" 
                               value="{{ tenant.email or '' }}">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-2"></i>Update Tenant
                        </button>
                        <a href="{{ url_for('list_tenants') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-circle me-2"></i>Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
